<svg viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Periphery branch structure (simplified)</title>
<desc>combine = upstream plus four branches: three independent PR/feature branches and one treeswift-extras bundle holding all Treeswift-only code. Consumed by the Treeswift git subtree.</desc>
<style>
  .h{font-size:15px;font-weight:700;fill:#1a1a1a}
  .n{font-size:11px;font-weight:600;fill:#222}
  .s{font-size:9px;fill:#666}
  .t{font-size:9px;fill:#777}
  .ts{font-size:8.5px;fill:#aaa}
</style>
<rect x="0" y="0" width="680" height="480" fill="#ffffff"/>
<text x="20" y="24" class="h">Periphery branches — how combine is built</text>
<text x="660" y="24" class="ts" text-anchor="end">2026-06-15</text>

<!-- subtree on top -->
<rect x="170" y="44" width="340" height="40" rx="8" fill="#e8eaf6" stroke="#3949ab" stroke-width="2"/>
<text x="340" y="62" class="n" text-anchor="middle" fill="#283593">Treeswift git subtree (PeripherySource/periphery)</text>
<text x="340" y="77" class="s" text-anchor="middle">= exact copy of combine · self-contained build</text>
<text x="340" y="100" class="t" text-anchor="middle">↑ git subtree pull</text>

<!-- combine -->
<rect x="170" y="108" width="340" height="40" rx="8" fill="#1976d2" stroke="#0d47a1" stroke-width="2"/>
<text x="340" y="126" class="n" text-anchor="middle" fill="#fff">combine  (origin/combine)</text>
<text x="340" y="140" class="s" text-anchor="middle" fill="#e3f2fd">= upstream + the 4 boxes below, merged in</text>

<!-- arrows into combine -->
<g stroke="#90a4ae" stroke-width="1.4" fill="none">
  <path d="M105 230 L105 168 L330 168"/>
  <path d="M255 230 L255 168"/>
  <path d="M425 230 L425 168"/>
  <path d="M575 230 L575 168 L350 168"/>
</g>
<polygon points="340,154 334,164 346,164" fill="#90a4ae"/>

<!-- 4 ingredient boxes -->
<rect x="40" y="230" width="130" height="58" rx="7" fill="#e8f5e9" stroke="#4caf50"/>
<text x="105" y="252" class="n" text-anchor="middle" fill="#2e7d32">#1133</text>
<text x="105" y="268" class="s" text-anchor="middle">subproject-refs</text>
<text x="105" y="281" class="t" text-anchor="middle">PR → upstream</text>

<rect x="190" y="230" width="130" height="58" rx="7" fill="#fff8e1" stroke="#f9a825"/>
<text x="255" y="252" class="n" text-anchor="middle" fill="#e65100">#1134</text>
<text x="255" y="268" class="s" text-anchor="middle">sole-class-init</text>
<text x="255" y="281" class="t" text-anchor="middle">PR → upstream</text>

<rect x="360" y="230" width="130" height="58" rx="7" fill="#e3f2fd" stroke="#1976d2"/>
<text x="425" y="252" class="n" text-anchor="middle" fill="#0d47a1">redundant-nested</text>
<text x="425" y="268" class="s" text-anchor="middle">#1048 feature</text>
<text x="425" y="281" class="t" text-anchor="middle">future PR</text>

<rect x="510" y="230" width="130" height="58" rx="7" fill="#fdeef0" stroke="#c2185b" stroke-width="2"/>
<text x="575" y="250" class="n" text-anchor="middle" fill="#ad1457">treeswift-extras</text>
<text x="575" y="265" class="s" text-anchor="middle">#1132 + ALL</text>
<text x="575" y="278" class="s" text-anchor="middle">Treeswift-only fixes</text>

<!-- all sit on upstream -->
<g stroke="#bbb" stroke-width="1.2" fill="none">
  <path d="M105 288 L105 386"/>
  <path d="M255 288 L255 386"/>
  <path d="M425 288 L425 386"/>
  <path d="M575 288 L575 386"/>
</g>

<rect x="170" y="388" width="340" height="40" rx="8" fill="#90a4ae" stroke="#455a64" stroke-width="2"/>
<text x="340" y="412" class="n" text-anchor="middle" fill="#fff">upstream/master (peripheryapp · f87c3f6)</text>

<!-- legend -->
<rect x="20" y="440" width="640" height="34" rx="6" fill="#fafafa" stroke="#ddd"/>
<text x="30" y="457" class="t">All 4 ingredient branches fork off upstream and merge into combine — no loops, no stacking. green/yellow/blue = real upstream</text>
<text x="30" y="468" class="t">PRs / feature. pink treeswift-extras = every Treeswift-only fix in ONE branch (it also carries #1132, which the assign-only fix needs).</text>
</svg>
